name: Patatatube Auto-Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/release.keystore

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Extract Version
        id: extract_version
        run: |
          VERSION=$(grep 'versionName =' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          
      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk Patatatube-v${{ env.APP_VERSION }}.apk

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: "Patatatube Mobile ${{ env.APP_VERSION }}"
          body: |
            ¡El descargador definitivo para tu Android ha llegado! 🥔🎧
            
            **¿Qué trae esta versión?**
            - 🎨 **Interfaz Renovada:** Construida 100% en Jetpack Compose con temas personalizables (Claro, Oscuro y Poke).
            - 🚀 **Motor Potenciado:** Descargas a la velocidad de la luz gracias a la integración nativa de `yt-dlp`.
            - 🔗 **Compartir y Listo:** Envía enlaces directamente desde el menú "Compartir" de YouTube, TikTok, Twitter y más, sin copiar ni pegar.
            - 🖥️ **Modo Hacker:** Terminal embebida en la propia app para que veas el log en tiempo real y no te pierdas nada.
            - 🔋 **Segundo Plano Real:** Tus descargas no se cortarán aunque minimices la aplicación o apagues la pantalla.
            
            **Instalación:**
            1. Descarga el archivo `Patatatube-v${{ env.APP_VERSION }}.apk` de los assets de abajo.
            2. Instálalo en tu dispositivo Android.
            3. ¡Empieza a descargar con estilo!
          files: Patatatube-v${{ env.APP_VERSION }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
